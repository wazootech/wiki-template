name: Deploy wiki to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install llm-wiki
        run: pip install git+https://github.com/wazootech/llm-wiki.git
      - name: Audit wiki style and SHACL constraints
        run: wiki check --strict -v
      - name: Verify SPARQL block rendering is up to date
        run: wiki render --check
      - name: Build Static Site
        run: wiki build --output-dir _site
      - uses: actions/upload-pages-artifact@v3
      - uses: actions/deploy-pages@v4
